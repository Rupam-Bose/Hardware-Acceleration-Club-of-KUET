<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us</title>
    <link rel="stylesheet" href="/Css/Join_Us.css">
        <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <script src="/JavaScript/hack.js"></script>
</head>
<body>
<header>
    <nav class="navbar">
         <img onclick="openHome()" src="/Images/Hack_logo.png" alt="" class="logo">
        <ul class="nav-links">
            <li onclick="openHome()">Home</li>
            <li onclick="openAbout()">About</li>
            <li onclick="openProjects()">Projects</li>
            <li onclick="openEvents()">Events</li>
            <li onclick="openContact()">Contact</li>
        </ul>
        <div>
        <button onclick="openlogin()" class="btn1">Log in</button>
        </div>
    </nav>
</header>


<div class="background"></div>

<div class="container">

    <div class="signup-card">

        <h1>Create <span>Your Account</span></h1>
        <p class="subtitle">
            Join KUET Tech Community and start building.
        </p>

        <form>

            <div class="row">
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-box">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" placeholder="Enter your full name">
                    </div>
                </div>

                <div class="input-group">
                    <label>Username</label>
                    <div class="input-box">
                        <i class="fa-solid fa-at"></i>
                        <input type="text" placeholder="Choose a username">
                    </div>
                </div>
            </div>

            <div class="input-group full">
                <label>Email Address</label>
                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" placeholder="Enter your email">
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Department</label>
                    <div class="input-box">
                        <i class="fa-solid fa-building-columns"></i>

                        <select>
                            <option>Select your department</option>
                        </select>

                        <i class="fa-solid fa-chevron-down right-icon"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Batch / Session</label>
                    <div class="input-box">
                        <i class="fa-regular fa-calendar"></i>

                        <select>
                            <option>Select your batch</option>
                        </select>

                        <i class="fa-solid fa-chevron-down right-icon"></i>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Create a password">
                        <i class="fa-regular fa-eye right-icon"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Confirm your password">
                        <i class="fa-regular fa-eye right-icon"></i>
                    </div>
                </div>
            </div>

            <div class="checkbox">
                <input type="checkbox" checked>
                <label>
                    I agree to the
                    <a href="#">Terms of Service</a>
                    and
                    <a href="#">Privacy Policy</a>
                </label>
            </div>

            <button class="signup-btn">
                Sign Up
                <i class="fa-solid fa-arrow-right"></i>
            </button>

            <div class="divider">
                <span>or sign up with</span>
            </div>

            <div class="social-login">
                <button>
                    <i class="fa-brands fa-google"></i>
                </button>

                <button>
                    <i class="fa-brands fa-github"></i>
                </button>

                <button>
                    <i class="fa-brands fa-linkedin-in"></i>
                </button>
            </div>

            <p class="login-text">
                Already have an account?
                <a href="#">Login</a>
            </p>

        </form>

    </div>

    <div class="stats">

        <div class="stat">
            <i class="fa-regular fa-user"></i>
            <div>
                <h3>2K+</h3>
                <p>Members</p>
            </div>
        </div>

        <div class="stat">
            <i class="fa-solid fa-code"></i>
            <div>
                <h3>500+</h3>
                <p>Projects</p>
            </div>
        </div>

        <div class="stat">
            <i class="fa-regular fa-calendar"></i>
            <div>
                <h3>50+</h3>
                <p>Events</p>
            </div>
        </div>

        <div class="stat">
            <i class="fa-solid fa-graduation-cap"></i>
            <div>
                <h3>10+</h3>
                <p>Workshops</p>
            </div>
        </div>

    </div>

</div>
    
</body>
</html>
